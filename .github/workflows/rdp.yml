name: Windows RDP
on: workflow_dispatch
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Enable RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fSingleSessionPerUser" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          net user runneradmin Nuvex@12345

      - name: Download Cloudflared
        run: |
          Invoke-WebRequest https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe -OutFile C:\cloudflared.exe

      - name: Start Tunnel & Keep Alive
        run: |
          Start-Process -FilePath "C:\cloudflared.exe" -ArgumentList "tunnel --url tcp://localhost:3389" -RedirectStandardOutput "C:\tunnel.log" -RedirectStandardError "C:\tunnel_err.log" -NoNewWindow
          Start-Sleep -Seconds 8
          Write-Host "=== TUNNEL URL ==="
          Get-Content C:\tunnel_err.log | Select-String "trycloudflare.com"
          Write-Host "=================="
          while ($true) {
            Start-Sleep -Seconds 20
            Write-Host "Still running..."
            Get-Content C:\tunnel_err.log | Select-String "trycloudflare.com"
          }
